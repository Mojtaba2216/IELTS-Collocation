
name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: دریافت فایل‌های پروژه
        uses: actions/checkout@v7

      - name: نصب Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: پیدا کردن پروژه Android
        shell: bash
        run: |
          GRADLEW_PATH="$(find "$GITHUB_WORKSPACE" -type f -name gradlew | head -n 1)"

          if [ -z "$GRADLEW_PATH" ]; then
            echo "::error::فایل gradlew پیدا نشد. فایل‌های پروژه Android را کامل و از حالت ZIP خارجشده آپلود کنید."
            find "$GITHUB_WORKSPACE" -maxdepth 4 -type f | sort | head -n 200
            exit 1
          fi

          PROJECT_DIR="$(dirname "$GRADLEW_PATH")"

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Android project found at: $PROJECT_DIR"

      - name: ساخت فایل APK
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: بررسی خروجی APK
        shell: bash
        run: |
          APK_FILES="$(find "$GITHUB_WORKSPACE" -type f -path "*/build/outputs/apk/debug/*.apk")"

          if [ -z "$APK_FILES" ]; then
            echo "::error::Build انجام شد اما فایل APK پیدا نشد."
            exit 1
          fi

          echo "APK files:"
          echo "$APK_FILES"

      - name: آماده‌کردن APK برای دانلود
        uses: actions/upload-artifact@v7
        with:
          name: IELTS-Leitner-debug-apk
          path: "**/build/outputs/apk/debug/*.apk"
          if-no-files-found: error
          retention-days: 30
