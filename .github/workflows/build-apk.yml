name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ielts-collocation-leitner-box

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.3.1"

      - name: Verify project
        run: |
          pwd
          ls -la
          test -f settings.gradle.kts
          test -f build.gradle.kts
          test -d app

      - name: Build Debug APK
        run: gradle :app:assembleDebug --stacktrace --no-daemon

      - name: Find APK
        run: |
          find app/build/outputs/apk -type f -name "*.apk" -print

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IELTS-Leitner-debug-apk
          path: ielts-collocation-leitner-box/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
